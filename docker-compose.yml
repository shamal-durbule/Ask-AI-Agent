services:
  postgres:
    image: postgres:16-alpine
    container_name: ask-ai-postgres
    environment:
      POSTGRES_USER: askaiagent
      POSTGRES_PASSWORD: askaiagent
      POSTGRES_DB: askaiagent
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U askaiagent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
